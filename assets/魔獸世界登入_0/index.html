<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>魔獸世界_臨摹</title>
    <link rel="stylesheet" href="./reset.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
      <div class="page">
    <div class="logo"></div>
    <div class="container">
      <form action="">
        <div class="div1"></div>
        <div class="div2">
          <div class="row">
            <label for="">1. 選擇系統</label>
            <select name="" id="">
              <option value="">請選擇手機系統</option>
              <option value="">iOS</option>
              <option value="">Android</option>
            </select>
          </div>
          <div class="row">
            <label for="">2. 選擇伺服器</label>
            <select name="" id="">
              <option value="">請選擇伺服器</option>
              <option value="">梣谷伺服器</option>
              <option value="">阿薩斯伺服器</option>
              <option value="">幽暗城伺服器</option>
            </select>
          </div>
          <div class="row">
            <label for="">3. 輸入角色ID</label>
            <input type="text" placeholder="請輸入角色ID" />
          </div>
          <div class="row">
            <label for="">4. 輸入序號</label>
            <input type="text" placeholder="請輸入序號" />
          </div>
          <div class="action">
            <button>切換帳號</button>
            <button>確定</button>
          </div>
        </div>
        <div class="div3"></div>
      </form>
      <div class="scene">
        <!-- <img src="./img/wow_king.png" alt="plane" class="floating" /> -->
      </div>
    </div>
  </body>
</html>
