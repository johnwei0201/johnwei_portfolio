<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Space - Shooting Game</title>
    <style>
      @font-face {
        font-family: "zpix";
        src: url("./assets/fonts/zpix.ttf") format("truetype");
      }
      body {
        background-color: #1a0033;
        color: #ffffff;
        font-family: "zpix", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        height: 100vh;
        padding-top: 40px;
        overflow: hidden;
      }
      canvas {
        background: #000000;
        border: 2px solid #ffcc00;
        box-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
        max-width: 90vw;
      }
      button {
        touch-action: manipulation;
      }
      .card {
        width: 60%;
        margin-top: 20px;
        padding: 1.5rem;
        border: 4px solid #7a3cff;
        border-radius: 12px;
        background: rgba(13, 0, 26, 0.8);
        text-align: center;
      }
      h3 {
        color: #e3db6c;
        margin-top: 0;
      }
      p {
        margin: 5px 0;
        font-size: 14px;
      }
      /* 手機控制按鈕 */
      .mobile-controls {
        position: fixed;
        bottom: 20px;
        width: 100%;
        display: flex;
        justify-content: space-between; /* 左右分開 */
        align-items: center;
        padding: 0 20px; /* 左右留點空間 */
        z-index: 10;
      }
      .left-controls {
        margin-left: 20px;
        display: flex;
        gap: 10px;
      }

      .btn-shoot {
        margin-right: 20px;
      }
      .mobile-controls button {
        font-size: 28px;
        padding: 28px 25px;
        border-radius: 10px;
        border: none;
        background: rgba(255, 255, 255, 0.2);
        color: white;
        /* 防止長按選取文字 */
        -webkit-user-select: none;
        user-select: none;
      }
      .mobile-controls {
        bottom: 50px;
      }

      /* 📱 手機才顯示 */
      @media (max-width: 768px) {
        .mobile-controls {
          display: flex;
          bottom: 220px;
        }
        .card {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="game" width="600" height="400"></canvas>
    <div class="mobile-controls">
      <div class="left-controls">
        <button class="btn-left">◀</button>
        <button class="btn-right">▶</button>
      </div>

      <button class="btn-shoot">●</button>
    </div>
    <div class="card">
      <h3>遊戲規則</h3>
      <p id="mode-text">模式載入中...</p>
      <p>1P: [A]、[D] 移動, [空白鍵] 射擊</p>
      <p id="p2-controls">2P: [←][→] 左右移動, [Enter] 射擊</p>
    </div>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      //
      let touchX = null;
      let isMobile = window.innerWidth <= 768;
      // --- 圖片載入區---
      //
      const imgP1 = new Image();
      imgP1.src = "./assets/img/plane_1.png";

      const imgP2 = new Image();
      imgP2.src = "./assets/img/plane_2.png";
      // --------------------------

      // 從 URL 取得遊戲模式 (1 or 2 players)
      const urlParams = new URLSearchParams(window.location.search);
      const mode = urlParams.get("mode") || "1";
      document.getElementById("mode-text").innerText = `${mode} PLAYER MODE`;

      // 如果是單人模式，隱藏 P2 的提示並移除 P2 角色
      if (mode === "1" || isMobile) {
        document.getElementById("p2-controls").style.display = "none";
      }

      const players = [
        {
          x: canvas.width / 2 - 80,
          y: canvas.height - 40,
          width: 40,
          height: 30,
          speed: 5,
          img: imgP1,
          controls: { left: "KeyA", right: "KeyD", shoot: "Space" },
        },
      ];

      if (mode === "2") {
        players.push({
          x: canvas.width / 2 + 50,
          y: canvas.height - 40,
          width: 40,
          height: 30,
          speed: 5,
          img: imgP2,
          controls: { left: "ArrowLeft", right: "ArrowRight", shoot: "Enter" },
        });
      }
      let score1 = 0;
      let score2 = 0;

      let bullets = [];
      let enemies = [];
      let keys = {};
      // 手機版遊戲按鈕控制
      const btnLeft = document.querySelector(".btn-left");
      const btnRight = document.querySelector(".btn-right");
      const btnShoot = document.querySelector(".btn-shoot");

      let moveLeft = false;
      let moveRight = false;

      window.addEventListener("keydown", (e) => {
        keys[e.code] = true;
        players.forEach((p, index) => {
          if (e.code === p.controls.shoot) shoot(p, index);
        });
      });

      window.addEventListener("keyup", (e) => {
        keys[e.code] = false;
      });

      function shoot(player, owner) {
        bullets.push({
          x: player.x + player.width / 2 - 2,
          y: player.y,
          owner,
        });
      }

      function spawnEnemy() {
        enemies.push({ x: Math.random() * (canvas.width - 20), y: 0 });
      }

      function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        players.forEach((p, index) => {
          // 電腦控制
          if (keys[p.controls.left]) p.x -= p.speed;
          if (keys[p.controls.right]) p.x += p.speed;

          if (isMobile && index === 0) {
            if (moveLeft) p.x -= p.speed;
            if (moveRight) p.x += p.speed;
          }
          p.x = Math.max(0, Math.min(canvas.width - p.width, p.x));
        });

        bullets.forEach((b) => (b.y -= 7));
        bullets = bullets.filter((b) => b.y > 0);
        enemies.forEach((e) => (e.y += 2));

        enemies = enemies.filter((e) => {
          let hitBulletIndex = bullets.findIndex(
            (b) => b.x > e.x && b.x < e.x + 20 && b.y > e.y && b.y < e.y + 20,
          );

          if (hitBulletIndex !== -1) {
            // 取得這顆子彈的主人 (0 代表 1P, 1 代表 2P)
            const owner = bullets[hitBulletIndex].owner;

            if (owner === 0) {
              score1 += 100;
            } else {
              score2 += 100;
            }

            // 移除該顆子彈，避免一顆子彈貫穿所有敵人
            bullets.splice(hitBulletIndex, 1);
            return false; // 移除敵人
          }
          return e.y < canvas.height; // 超過螢幕下方的敵人也移除
        });
        // 2. 畫玩家
        players.forEach((p) => {
          // 使用 drawImage 畫出飛機 PNG
          ctx.drawImage(p.img, p.x, p.y, p.width, p.height);
        });
        // 3. 畫子彈
        ctx.fillStyle = "yellow";
        bullets.forEach((b) => ctx.fillRect(b.x, b.y, 4, 10));
        // 敵機
        ctx.fillStyle = "red";
        enemies.forEach((e) => {
          ctx.fillRect(e.x, e.y, 20, 20);
        });

        ctx.font = "18px zpix";
        ctx.fillStyle = "cyan";
        ctx.fillText(`1P: ${score1}`, 20, 30);

        if (mode === "2") {
          ctx.fillStyle = "lime";
          // 讓 2P 分數靠右顯示
          ctx.fillText(`2P: ${score2}`, canvas.width - 100, 30);
        }

        requestAnimationFrame(update);
      }

      setInterval(spawnEnemy, 800);
      update();

      //  手機點擊 = 射擊
      shoot(players[0], 0);

      canvas.addEventListener("touchmove", (e) => {
        e.preventDefault();
        touchX = e.touches[0].clientX;
      });

      canvas.addEventListener("touchend", () => {
        touchX = null;
      });

      //  防止畫面滑動
      document.body.addEventListener(
        "touchmove",
        (e) => {
          if (e.target === canvas) e.preventDefault();
        },
        { passive: false },
      );

      // 📱 手機按鈕控制
      // 左移
      btnLeft?.addEventListener("touchstart", () => (moveLeft = true));
      btnLeft?.addEventListener("touchend", () => (moveLeft = false));

      // 右移
      btnRight?.addEventListener("touchstart", () => (moveRight = true));
      btnRight?.addEventListener("touchend", () => (moveRight = false));

      // 射擊
      btnShoot?.addEventListener("touchstart", () => shoot(players[0], 0));

      btnLeft?.addEventListener("touchstart", (e) => {
        e.preventDefault();
        moveLeft = true;
      });

      btnRight?.addEventListener("touchstart", (e) => {
        e.preventDefault();
        moveRight = true;
      });

      btnShoot?.addEventListener("touchstart", (e) => {
        e.preventDefault();
        shoot(players[0], 0);
      });
    </script>
  </body>
</html>
